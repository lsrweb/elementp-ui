name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    # 只在版本已更新的情况下运行
    if: contains(github.event.head_commit.message, 'version') || contains(github.event.head_commit.message, 'chore:')
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get version
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        run: |
          if git rev-parse "refs/tags/v${{ steps.package.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "RELEASE_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Build
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        run: |
          npm run bootstrap
          npm run dist

      - name: Create Release
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.package.outputs.TAG }}
          name: Release ${{ steps.package.outputs.VERSION }}
          body: |
            ## version ${{ steps.package.outputs.VERSION }}
            
            Preview: https://element-ui-ui.github.io/element/v${{ steps.package.outputs.VERSION }}/
            
            For more info, see https://github.com/${{ github.repository }}/releases/tag/${{ steps.package.outputs.TAG }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node for NPM
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          registry-url: 'https://registry.npmjs.com'

      - name: Publish to NPM
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
