name: Update Preview URLs

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get latest release
        id: latest_release
        uses: actions/github-script@v6
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            if (releases.data.length > 0) {
              const release = releases.data[0];
              const version = release.tag_name.replace(/^v/, '');
              console.log(`Latest version: v${version}`);
              core.setOutput('version', version);
              core.setOutput('url', `https://${context.repo.owner}.github.io/${context.repo.repo}/v${version}/`);
            }

      - name: Update README
        if: steps.latest_release.outputs.version
        shell: bash
        run: |
          VERSION="${{ steps.latest_release.outputs.version }}"
          PREVIEW_URL="${{ steps.latest_release.outputs.url }}"
          
          if grep -q "PREVIEW_URL" README.md; then
            sed -i "s|PREVIEW_URL.*|Preview: [https://element-ui-ui.github.io/element/v${VERSION}/](https://element-ui-ui.github.io/element/v${VERSION}/)|" README.md
          else
            echo "" >> README.md
            echo "## Preview & Deployment" >> README.md
            echo "" >> README.md
            echo "- **Latest Release**: https://element-ui-ui.github.io/element/" >> README.md
            echo "- **Dev Branch**: https://element-ui-ui.github.io/element/dev/" >> README.md
            echo "- **Version v${VERSION}**: ${PREVIEW_URL}" >> README.md
          fi

      - name: Commit changes
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git add README.md
          git commit -m "docs: update preview URLs for v${{ steps.latest_release.outputs.version }}" || echo "No changes to commit"

      - name: Push changes
        run: git push origin main || echo "No changes to push"
